<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=https://api.nodeblink.dev/dashboard">
  <link rel="canonical" href="https://api.nodeblink.dev/dashboard">
  <title>NodeBlink Creator Studio</title>
  <script src="config.js"></script>
  <script>
    var app = (window.NODEBLINK_CONFIG && window.NODEBLINK_CONFIG.appUrl) || "https://api.nodeblink.dev";
    window.location.replace(app.replace(/\/$/, "") + "/dashboard");
  </script>
</head>
<body>
  <p>Redirecting to <a id="link" href="https://api.nodeblink.dev/dashboard">Creator Studio</a>…</p>
  <script>
    var app = (window.NODEBLINK_CONFIG && window.NODEBLINK_CONFIG.appUrl) || "https://api.nodeblink.dev";
    document.getElementById("link").href = app.replace(/\/$/, "") + "/dashboard";
  </script>
</body>
</html>
