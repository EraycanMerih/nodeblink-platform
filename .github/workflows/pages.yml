name: Deploy GitHub Pages (frontend only)

on:
  push:
    branches:
      - main
      - upgrade/solana-and-next
    paths:
      - "index.html"
      - "dashboard.html"
      - "assets/**"
      - "public/**"
      - "scripts/build-github-pages.sh"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-branch
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NODEBLINK_API_URL: https://api.nodeblink.dev
      NODEBLINK_SITE_URL: https://nodeblink.dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build static frontend bundle
        run: bash scripts/build-github-pages.sh

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./_site
