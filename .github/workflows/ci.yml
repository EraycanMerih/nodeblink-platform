name: CI

on:
  push:
    branches: [ main, upgrade/solana-and-next ]
  pull_request:
    branches: [ main, upgrade/solana-and-next ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/nodeblink
      DIRECT_URL: postgresql://ci:ci@localhost:5432/nodeblink
      PUBLIC_BASE_URL: https://nodeblink.dev
      SOLANA_RPC_URL: https://api.mainnet-beta.solana.com
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Build Next
        run: npm run build:next
