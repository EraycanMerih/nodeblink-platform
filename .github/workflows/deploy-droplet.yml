name: Deploy to DigitalOcean

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-droplet
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DO_ENV_FILE: ${{ secrets.DO_ENV_FILE }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DO_SSH_PORT || 22 }}
          envs: DO_ENV_FILE
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="/opt/nodeblink/repo"
            mkdir -p /opt/nodeblink
            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
              git fetch origin
              git checkout main
              git reset --hard origin/main
            else
              git clone https://github.com/EraycanMerih/nodeblink-platform.git "$APP_DIR"
              cd "$APP_DIR"
              git checkout main
            fi
            if [ -z "${DO_ENV_FILE:-}" ]; then
              echo "DO_ENV_FILE secret is empty"
              exit 1
            fi
            if printf "%s" "$DO_ENV_FILE" | base64 -d > .env 2>/dev/null; then
              echo "Loaded .env from base64 DO_ENV_FILE"
            else
              echo "DO_ENV_FILE is not valid base64, treating it as raw .env content"
              printf "%s" "$DO_ENV_FILE" > .env
            fi
            chmod 600 .env
            export NODE_ENV=production
            command -v node >/dev/null || (curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y nodejs)
            command -v pm2 >/dev/null || npm install -g pm2
            npm ci --ignore-scripts
            npx prisma generate
            set +e
            grep -Eq '^DIRECT_URL=.+' .env
            HAS_DIRECT_URL=$?
            grep -Eq '^DATABASE_URL=.+' .env
            HAS_DATABASE_URL=$?
            set -e
            if [ "$HAS_DIRECT_URL" -eq 0 ] && [ "$HAS_DATABASE_URL" -eq 0 ]; then
              npx prisma migrate deploy || true
              npm run prisma:seed || true
            else
              echo "Skipping migrate/seed: DATABASE_URL or DIRECT_URL missing in .env"
            fi
            npm run build:next
            systemctl stop nodeblink 2>/dev/null || true
            systemctl disable nodeblink 2>/dev/null || true
            pm2 delete nodeblink nodeblink-next nodeblink-api 2>/dev/null || true
            pm2 start ecosystem.config.js --env production --update-env
            pm2 save
            bash scripts/install-nginx.sh
            echo "Deploy complete"
            curl -sf http://127.0.0.1:3000/api/health
            curl -sfI http://127.0.0.1:3000/creator/demo | head -1