version: '3.8'
services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: nodeblink
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: nodeblink
    volumes:
      - db-data:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://nodeblink:changeme@db:5432/nodeblink
      # add other env vars in your droplet env or override here
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - ./uploads:/usr/src/app/uploads

volumes:
  db-data:
